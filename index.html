<!DOCTYPE html>
<html>
<head>
<title>Sritam Nayek | Cloud Engineer</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(120deg, #1f1c2c, #928dab);
    color: white;
}

/* Navbar */
nav {
    text-align: center;
    padding: 15px;
    background: rgba(0,0,0,0.5);
}

/* Section */
section {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* 3D Card */
.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    transform-style: preserve-3d;
    transition: transform 0.5s;
    text-align: center;
}

.card:hover {
    transform: rotateY(10deg) rotateX(10deg) scale(1.05);
}

/* Image */
img {
    width: 120px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* Button */
button {
    padding: 10px 20px;
    border: none;
    background: #ffeb3b;
    border-radius: 5px;
    cursor: pointer;
}
</style>

</head>

<body>

<nav>Sritam Portfolio</nav>

<section>
<div class="card">
<img src="pic.jpg" alt="profile">
<h1>Sritam Nayek</h1>
<p>Future Cloud Engineer ☁️</p>

<button onclick="playAudio()">Play Intro</button>

<audio id="audio">
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
</audio>

</div>
</section>

<script>
function playAudio() {
    document.getElementById("audio").play();
}
</script>

</body>
</html>
